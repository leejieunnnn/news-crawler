name: Backend CI/CD Pipeline

# 트리거: main 브랜치 backend 폴더 변경 시에만 실행
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
# ────────────────────────────────────
# JOB 1: CI (린트 + 테스트 + 빌드)
# ────────────────────────────────────
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: 린트 검사 (flake8)
        working-directory: backend
        run: flake8 . --max-line-length=100 --exclude=__pycache__

      - name: 테스트 실행 (pytest)
        working-directory: backend
        run: pytest tests/ -v

      - name: 도커 빌드 확인
        run: docker build -t news-crawler:test ./backend

# ────────────────────────────────────
# JOB 2: ECR 푸시 (CI 통과 후 실행)
# ────────────────────────────────────
  push-ecr:
    runs-on: ubuntu-latest
    needs: ci
    # 팀원한테 정보 받으면 아래 if 제거
    if: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 빌드 & ECR 푸시
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: news-crawler-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

# ────────────────────────────────────
# JOB 3: EKS 배포 (ECR 푸시 후 실행)
# ────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: push-ecr
    # 팀원한테 정보 받으면 아래 if 제거
    if: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: kubeconfig 업데이트
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ap-northeast-2

      - name: kubectl 설치
        uses: azure/setup-kubectl@v3

      - name: CronJob 이미지 업데이트
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image cronjob/news-crawler \
            crawler=$ECR_REGISTRY/news-crawler-backend:$IMAGE_TAG \
            -n ${{ secrets.EKS_NAMESPACE }}

# ────────────────────────────────────
# JOB 4: Slack 알림 (항상 실행)
# ────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [ci, push-ecr, deploy]
    if: always()

    steps:
      - name: 배포 성공 알림
        if: ${{ needs.ci.result == 'success' }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          -d '{
            "text": "✅ *[news-crawler-backend]* 빌드 완료!\n커밋: ${{ github.sha }}\n작업자: ${{ github.actor }}"
          }'

      - name: 배포 실패 알림
        if: ${{ needs.ci.result == 'failure' }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          -d '{
            "text": "❌ *[news-crawler-backend]* 빌드 실패!\n작업자: ${{ github.actor }}\n확인: ${{ github.server_url }}/${{ github.repository }}/actions"
          }'