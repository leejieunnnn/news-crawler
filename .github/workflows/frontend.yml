name: Frontend CI/CD Pipeline

# 트리거: main 브랜치 frontend 폴더 변경 시에만 실행
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
# ────────────────────────────────────
# JOB 1: CI (빌드 검증)
# ────────────────────────────────────
  ci:
    runs-on: ubuntu-latest 
    

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: 빌드 검증
        working-directory: frontend
        run: npm run build
        # 빌드 실패하면 이후 단계 실행 안 됨

# ────────────────────────────────────
# JOB 2-A: S3 배포 (배포 방식 확정 시 사용)
# ────────────────────────────────────
  deploy-s3:
    runs-on: ubuntu-latest
    needs: ci
    if: false  # 팀 합의 후 true로 변경

    permissions:
      id-token: write
      contents: read

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: 빌드
        working-directory: frontend
        run: npm run build

      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: S3 업로드
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=31536000"

      - name: index.html 캐시 무효화
        run: |
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache"

# ────────────────────────────────────
# JOB 2-B: EKS 웹서빙 파드 배포 (배포 방식 확정 시 사용)
# ────────────────────────────────────
  deploy-eks:
    runs-on: ubuntu-latest
    needs: ci
    if: false  # 팀 합의 후 true로 변경

    permissions:
      id-token: write
      contents: read

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 빌드 & ECR 푸시
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: news-crawler-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: kubeconfig 업데이트
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ap-northeast-2

      - name: EKS 웹서빙 파드 배포
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/news-crawler-frontend \
            frontend=$ECR_REGISTRY/news-crawler-frontend:$IMAGE_TAG \
            -n production

# ────────────────────────────────────
# JOB 3: Slack 알림 (항상 실행)
# ────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [ci]
    if: always()

    steps:
      - name: 빌드 성공 알림
        if: ${{ needs.ci.result == 'success' }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          -d '{
            "text": "✅ *[news-crawler-frontend]* 빌드 완료!\n커밋: ${{ github.sha }}\n작업자: ${{ github.actor }}"
          }'

      - name: 빌드 실패 알림
        if: ${{ needs.ci.result == 'failure' }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          -d '{
            "text": "❌ *[news-crawler-frontend]* 빌드 실패!\n작업자: ${{ github.actor }}\n확인: ${{ github.server_url }}/${{ github.repository }}/actions"
          }'